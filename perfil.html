<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Perfil – SITF</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/icon_guia.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.perfil-page { padding-top: var(--nav-h); }
.cover {
  height: 200px;
  background: linear-gradient(135deg, rgba(124,58,237,0.35), rgba(37,99,235,0.35));
  position: relative;
}
.cover-overlay {
  position:absolute;inset:0;
  background-image: linear-gradient(rgba(124,58,237,0.06) 1px,transparent 1px),
                    linear-gradient(90deg,rgba(124,58,237,0.06) 1px,transparent 1px);
  background-size:40px 40px;
}
.perfil-body { max-width:900px; margin:0 auto; padding:0 2rem 4rem; }
.perfil-card {
  background:var(--card); border:1px solid var(--border2);
  border-radius:var(--radius-lg); margin-top:-60px;
  padding:1.75rem; position:relative;
}
.avatar-pull {
  margin-top:-80px; margin-bottom:1rem;
  display:inline-block;
}
.perfil-avatar {
  width:100px; height:100px; border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;font-weight:800;color:#fff;
  font-family:"Syne",sans-serif;
  border:4px solid var(--card);
  box-shadow:0 0 0 2px rgba(124,58,237,0.4);
}
.perfil-name { font-size:1.6rem;font-weight:800;margin-bottom:0.2rem; }
.perfil-role { color:var(--purple-light);font-size:0.95rem;margin-bottom:0.5rem; }
.perfil-meta { display:flex;gap:1.5rem;flex-wrap:wrap;font-size:0.85rem;color:var(--text-muted);margin-bottom:1.25rem; }
.perfil-meta span { display:flex;align-items:center;gap:0.3rem; }
.perfil-actions { display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:1.25rem; }
.perfil-grid { display:grid;grid-template-columns:1fr 320px;gap:1.5rem;margin-top:1.5rem; }
.section-card { background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.25rem; }
.section-card h3 { font-size:0.9rem;font-weight:700;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border2); }
.skill-list { display:flex;gap:0.4rem;flex-wrap:wrap; }
.stat-pills { display:grid;grid-template-columns:1fr 1fr;gap:0.75rem; }
.stat-pill { background:var(--dark3);border-radius:var(--radius-sm);padding:1rem;text-align:center; }
.stat-pill strong { display:block;font-size:1.4rem;font-weight:800;font-family:"Syne",sans-serif; }
.stat-pill span { font-size:0.75rem;color:var(--text-muted); }
.review-item { padding:1rem 0;border-bottom:1px solid var(--border2); }
.review-item:last-child { border-bottom:none;padding-bottom:0; }
.share-btn { background:var(--dark3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:0.5rem 1rem;font-size:0.82rem;color:var(--text-muted);cursor:pointer;transition:0.2s;display:flex;align-items:center;gap:0.4rem; }
.share-btn:hover { color:var(--text);border-color:rgba(255,255,255,0.15); }
.not-found { text-align:center;padding:5rem 2rem; }
@media(max-width:768px){ .perfil-grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="scroll-progress"><div class="scroll-bar" id="scrollBar"></div></div>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <img src="assets/img/logo1.jpeg" alt="SITF Logo">
    <span class="sitf-text">SI<span>TF</span></span>
  </a>
  <div class="nav-links">
    <a href="index.html">Início</a>
    <a href="vagas.html">Vagas</a>
    <a href="freelancers.html" class="active">Freelancers</a>
    <a href="como-funciona.html">Como Funciona</a>
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-actions" id="navUserArea">
    <button class="btn btn-ghost btn-sm" onclick="openModal('login')">Entrar</button>
    <button class="btn btn-primary btn-sm" onclick="openModal('register')">Cadastrar</button>
  </div>
  <button class="hamburger" onclick="toggleDrawer()"><span></span><span></span><span></span></button>
</nav>

<div class="mobile-drawer" id="mobileDrawer">
  <a href="index.html" onclick="toggleDrawer()">🏠 Início</a>
  <a href="vagas.html" onclick="toggleDrawer()">🔍 Vagas</a>
  <a href="freelancers.html" onclick="toggleDrawer()">👥 Freelancers</a>
  <a href="como-funciona.html" onclick="toggleDrawer()">📋 Como Funciona</a>
  <div class="sep"></div>
  <a href="empregador.html" onclick="toggleDrawer()">🏢 Área do Empregador</a>
  <a href="freelancer.html" onclick="toggleDrawer()">💼 Área do Freelancer</a>
  <div class="sep"></div>
  <button class="btn btn-ghost btn-full" onclick="openModal('login');toggleDrawer()">Entrar</button>
  <button class="btn btn-primary btn-full" onclick="openModal('register');toggleDrawer()">Cadastrar-se</button>
</div>

<div class="perfil-page" id="perfilPage">
  <div class="cover"><div class="cover-overlay"></div></div>
  <div class="perfil-body">
    <div id="perfilContent">
      <div class="empty-state" style="margin-top:3rem">
        <div class="empty-state-icon">⏳</div>
        <h3>Carregando perfil...</h3>
      </div>
    </div>
  </div>
</div>

<div id="modalsContainer"></div>
<div class="toast" id="toast"><span class="toast-icon" id="toastIcon">✅</span><span id="toastMsg"></span></div>

<script src="shared.js"></script>
<script>
document.getElementById('modalsContainer').innerHTML = buildAuthModal();

// Update nav for logged-in user
const me = SITF.getUser();
if (me) {
  const na = document.getElementById('navUserArea');
  if (na) na.innerHTML = `<span style="font-size:0.82rem;color:var(--text-muted)">${me.nome}</span>
    <a href="${me.tipo==='empregador'?'empregador':'freelancer'}.html" class="btn btn-primary btn-sm">Meu Painel</a>`;
}

// Get user id from URL ?id=xxx
const params = new URLSearchParams(window.location.search);
const uid = params.get('id');

function renderPerfil(user) {
  const avals = SITF.getAvaliacoes().filter(a => a.avaliadoId === user.id && a.tipo === 'empregador_avalia_freelancer');
  const allUsers = SITF.getUsers();
  const avg = avals.length ? (avals.reduce((s,a)=>s+a.nota,0)/avals.length) : (user.rating || 0);
  const avgStr = avg ? avg.toFixed(1) : '–';
  const col = avatarColor(user.nome);

  document.title = user.nome + ' – SITF';

  document.getElementById('perfilContent').innerHTML = `
    <div class="perfil-card">
      <div class="avatar-pull">
        <div class="perfil-avatar" style="background:${col}">${initials(user.nome)}</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem">
        <div>
          <div class="perfil-name">${user.nome}</div>
          <div class="perfil-role">${user.bio ? user.bio.split('.')[0] : 'Freelancer'}</div>
          <div class="perfil-meta">
            ${user.cidade ? `<span>📍 ${user.cidade}${user.estado?', '+user.estado:''}</span>` : ''}
            ${user.rate ? `<span>💰 R$ ${user.rate}/${user.rateType||'hora'}</span>` : ''}
            ${user.online ? '<span style="color:var(--green)">● Online agora</span>' : '<span>○ Offline</span>'}
            ${avg ? `<span style="color:var(--amber)">${starsHTML(Math.round(avg))} ${avgStr} (${avals.length} avaliações)</span>` : ''}
          </div>
        </div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:flex-start">
          <button class="share-btn" onclick="compartilhar()">🔗 Compartilhar perfil</button>
        </div>
      </div>
      <div class="perfil-actions">
        <button class="btn btn-primary btn-lg" onclick="enviarMensagem('${user.id}','${user.nome}')">💬 Enviar mensagem</button>
        <button class="btn btn-outline btn-lg" onclick="verVagas()">🔍 Ver vagas compatíveis</button>
      </div>
    </div>

    <div class="perfil-grid">
      <!-- COLUNA PRINCIPAL -->
      <div>
        ${user.bio ? `
        <div class="section-card">
          <h3>👤 Sobre mim</h3>
          <p style="font-size:0.9rem;color:var(--text-muted);line-height:1.75">${user.bio}</p>
        </div>` : ''}

        ${(user.skills||[]).length ? `
        <div class="section-card">
          <h3>🛠️ Habilidades</h3>
          <div class="skill-list">
            ${user.skills.map(s=>`<span class="chip" style="font-size:0.82rem;padding:0.3rem 0.8rem">${s}</span>`).join('')}
          </div>
        </div>` : ''}

        <div class="section-card">
          <h3>⭐ Avaliações (${avals.length})</h3>
          ${avals.length ? avals.map(a => {
            const avaliador = allUsers.find(u=>u.id===a.avaliadorId);
            return `<div class="review-item">
              <div style="display:flex;align-items:center;gap:0.65rem;margin-bottom:0.5rem">
                ${avaliador ? avatarHTML(avaliador.nome,'sm') : ''}
                <div>
                  <div style="font-size:0.85rem;font-weight:600">${avaliador?avaliador.nome:'Empregador'}</div>
                  <div style="font-size:0.68rem;color:var(--text-dim)">${timeAgo(a.criado)}</div>
                </div>
                <div style="margin-left:auto;color:var(--amber);font-size:0.85rem">${starsHTML(a.nota)}</div>
              </div>
              <p style="font-size:0.85rem;color:var(--text-muted);font-style:italic;line-height:1.6">"${a.comentario}"</p>
            </div>`;
          }).join('') : '<p style="font-size:0.85rem;color:var(--text-muted)">Nenhuma avaliação ainda.</p>'}
        </div>
      </div>

      <!-- COLUNA LATERAL -->
      <div>
        <div class="section-card">
          <h3>📊 Estatísticas</h3>
          <div class="stat-pills">
            <div class="stat-pill"><strong>${user.projetos||0}</strong><span>Projetos</span></div>
            <div class="stat-pill"><strong>${avals.length||user.reviews||0}</strong><span>Avaliações</span></div>
            <div class="stat-pill"><strong>${avgStr}</strong><span>Nota média</span></div>
            <div class="stat-pill"><strong>${user.rate?'R$ '+user.rate:'–'}</strong><span>Por ${user.rateType||'hora'}</span></div>
          </div>
        </div>

        ${user.portfolio ? `
        <div class="section-card">
          <h3>🔗 Links</h3>
          <a href="https://${user.portfolio}" target="_blank" style="font-size:0.85rem;color:var(--purple-light);word-break:break-all">🌐 ${user.portfolio}</a>
        </div>` : ''}

        <div class="section-card">
          <h3>📍 Localização</h3>
          <p style="font-size:0.875rem;color:var(--text-muted)">${user.cidade||'Brasil'}${user.estado?', '+user.estado:''}</p>
          <div style="margin-top:0.75rem">
            <span class="badge ${user.online?'badge-remote':'badge-closed'}">${user.online?'● Disponível agora':'○ Indisponível'}</span>
          </div>
        </div>

        <div style="text-align:center;padding:1rem">
          <p style="font-size:0.75rem;color:var(--text-dim)">Perfil verificado no</p>
          <div class="nav-logo" style="justify-content:center;margin-top:0.4rem;font-size:1rem">
            <img src="assets/img/logo1.jpeg" alt="SITF Logo">
            <span class="sitf-text">SI<span>TF</span></span>
          </div>
        </div>
      </div>
    </div>`;
}

function renderNotFound() {
  document.getElementById('perfilContent').innerHTML = `
    <div class="not-found">
      <div style="font-size:4rem;margin-bottom:1rem">😕</div>
      <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:0.75rem">Perfil não encontrado</h2>
      <p style="color:var(--text-muted);margin-bottom:2rem">O usuário que você está procurando não existe ou foi removido.</p>
      <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap">
        <a href="freelancers.html" class="btn btn-primary btn-lg">Ver todos os freelancers</a>
        <a href="index.html" class="btn btn-ghost btn-lg">Voltar ao início</a>
      </div>
    </div>`;
}

function enviarMensagem(id, nome) {
  const user = SITF.getUser();
  if (!user) { openModal('login'); showToast('Faça login para enviar mensagem.','warn'); return; }
  showToast(`Abrindo chat com ${nome}...`,'info');
  setTimeout(() => {
    window.location.href = (user.tipo==='empregador'?'empregador':'freelancer') + '.html#chat';
  }, 800);
}

function verVagas() {
  window.location.href = 'vagas.html';
}

function compartilhar() {
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showToast('Link copiado para a área de transferência! 🔗','success'));
  } else {
    showToast('URL: ' + url,'info');
  }
}

// Load profile
if (uid) {
  const users = SITF.getUsers();
  const user = users.find(u => u.id === uid && u.tipo === 'freelancer');
  if (user) renderPerfil(user);
  else renderNotFound();
} else {
  renderNotFound();
}
</script>
</body>
</html>
